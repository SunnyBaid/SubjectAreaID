<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ID Lookup Tool</title>

  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f1f1f;
      --subtext: #666666;
      --border: #dddddd;
      --input-bg: #ffffff;
      --primary: #0078d4;
      --primary-hover: #005fa8;
      --secondary-bg: #f2f2f2;
      --secondary-text: #222222;
      --copy-bg: #ffffff;
      --copy-border: #d0d0d0;
      --highlight: #fff3a3;
      --shadow: 0 2px 8px rgba(0,0,0,0.05);
      --suggestion-hover: #f1f7fd;
      --toast-bg: #1f7a1f;
      --toast-text: #ffffff;
    }

    body.dark {
      --bg: #1e1e1e;
      --card: #2b2b2b;
      --text: #f5f5f5;
      --subtext: #bdbdbd;
      --border: #444444;
      --input-bg: #333333;
      --primary: #4ea1ff;
      --primary-hover: #2f8df7;
      --secondary-bg: #3a3a3a;
      --secondary-text: #f5f5f5;
      --copy-bg: #383838;
      --copy-border: #555555;
      --highlight: #ffe36a;
      --shadow: 0 2px 10px rgba(0,0,0,0.25);
      --suggestion-hover: #383f46;
      --toast-bg: #2d9b2d;
      --toast-text: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 30px 16px;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.25s ease, color 0.25s ease;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: var(--shadow);
      transition: background 0.25s ease, border-color 0.25s ease;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    h2 {
      margin: 0;
      color: var(--primary);
      font-size: 28px;
    }

    .mode-toggle {
      border: 1px solid var(--border);
      background: var(--secondary-bg);
      color: var(--secondary-text);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: 0.2s ease;
    }

    .mode-toggle:hover {
      transform: translateY(-1px);
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--subtext);
      font-size: 14px;
    }

    .search-area {
      position: relative;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input {
      flex: 1;
      min-width: 280px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.12);
    }

    .btn {
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .btn.primary {
      background: var(--primary);
      color: #ffffff;
    }

    .btn.primary:hover {
      background: var(--primary-hover);
    }

    .btn.secondary {
      background: var(--secondary-bg);
      color: var(--secondary-text);
      border: 1px solid var(--border);
    }

    .btn.secondary:hover {
      opacity: 0.95;
    }

    .helper {
      margin: 10px 0 14px;
      font-size: 13px;
      color: var(--subtext);
    }

    .suggestions {
      display: none;
      position: absolute;
      top: 52px;
      left: 0;
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
      z-index: 10;
      max-height: 220px;
      overflow-y: auto;
    }

    .suggestion-item {
      padding: 10px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 14px;
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover {
      background: var(--suggestion-hover);
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin: 12px 0 8px;
    }

    .recent-wrap {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .recent-label {
      font-size: 13px;
      color: var(--subtext);
      font-weight: bold;
    }

    .recent-chip {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--secondary-bg);
      color: var(--secondary-text);
      font-size: 12px;
      cursor: pointer;
    }

    .recent-chip:hover {
      opacity: 0.9;
    }

    .status {
      min-height: 18px;
      font-size: 13px;
      color: var(--subtext);
    }

    #result {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .result-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .match-title {
      margin-bottom: 12px;
      font-weight: bold;
      color: var(--primary);
      font-size: 15px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .left {
      flex: 1;
      min-width: 0;
      word-break: break-word;
      line-height: 1.45;
    }

    .badge {
      display: inline-block;
      min-width: 34px;
      padding: 3px 8px;
      margin-right: 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      color: #ffffff;
      text-align: center;
      vertical-align: middle;
    }

    .badge.l1 { background: #0078d4; }
    .badge.l2 { background: #2e8b57; }
    .badge.l3 { background: #d97706; }
    .badge.l4 { background: #7c3aed; }

    .copy-btn {
      padding: 7px 10px;
      font-size: 12px;
      border-radius: 8px;
      border: 1px solid var(--copy-border);
      background: var(--copy-bg);
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
    }

    .copy-btn:hover {
      opacity: 0.9;
    }

    .copy-btn.copied {
      background: #228b22;
      color: #ffffff;
      border-color: #228b22;
    }

    .highlight {
      background: var(--highlight);
      color: #000000;
      padding: 1px 4px;
      border-radius: 4px;
      font-weight: bold;
    }

    .empty-box {
      text-align: center;
      padding: 18px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      color: var(--subtext);
      background: rgba(255,255,255,0.02);
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: var(--toast-bg);
      color: var(--toast-text);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: 0.25s ease;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 640px) {
      h2 {
        font-size: 24px;
      }

      .row {
        flex-direction: column;
        align-items: stretch;
      }

      .copy-btn {
        width: fit-content;
      }

      .meta-row {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="top-bar">
        <h2>ID Lookup Tool</h2>
        <button id="modeToggle" class="mode-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
      </div>

      <p class="subtitle">
        Enter an ID from any section and get the hierarchy based on the matched level.
      </p>

      <div class="search-area">
        <div class="controls">
          <input id="input" type="text" placeholder="Enter ID or paste full text" autocomplete="off" />
          <button class="btn primary" onclick="search()">Search</button>
          <button class="btn secondary" onclick="clearSearch()">Clear</button>
        </div>
        <div id="suggestions" class="suggestions"></div>
      </div>

      <div class="helper">
        Examples: <b>20010060</b> or <b>20010060- Azure AD – Developer</b>
      </div>

      <div class="meta-row">
        <div class="recent-wrap">
          <span class="recent-label">Recent:</span>
          <div id="recentSearches" class="recent-wrap"></div>
        </div>
        <div id="status" class="status"></div>
      </div>

      <div id="result"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
<!-- ✅ ===== TIME CALCULATOR START ===== -->
<div class="container" style="margin-top:20px;">
  <div class="card" style="max-width:600px;">

    <h2>Time Calculator</h2>

    <!-- Row 1 -->
    <div style="display:flex; gap:10px; align-items:center;">
      <input id="minInput" type="number" placeholder="Minutes (e.g. 50)" style="flex:2;">
      <button class="btn primary" style="width:auto; flex-shrink:0;" onclick="convertToHHMM()">Convert</button>
    </div>

    <br>

    <!-- Row 2 -->
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <input id="hourInput" type="number" placeholder="HH" style="flex:1 1 120px; min-width:0;">
      <input id="minPartInput" type="number" placeholder="MM" style="flex:1 1 120px; min-width:0;">
      <button class="btn primary" style="width:auto; flex-shrink:0;" onclick="convertToMin()">Convert</button>
    </div>

    <!-- ✅ Result label -->
    <div style="margin-top:15px; font-weight:bold; color:var(--subtext);">
      Result
    </div>

    <!-- ✅ Result box -->
    <div id="timeResult" style="
      margin-top:8px;
      padding:14px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--card);
    "></div>

  </div>
</div>

  <script src="data.js"></script>

  <script>
    let allIds = [];
    let recentSearches = JSON.parse(localStorage.getItem("recentSearches") || "[]");
    let currentSuggestions = [];

    function getID(value) {
      if (!value) return "";
      const match = value.toString().match(/\d+/);
      return match ? match[0] : "";
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");

      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1500);
    }

    function copyID(id, btn) {
      if (!id) return;

      navigator.clipboard.writeText(id)
        .then(() => {
          if (btn) {
            const original = btn.textContent;
            btn.textContent = "Copied";
            btn.classList.add("copied");

            setTimeout(() => {
              btn.textContent = original;
              btn.classList.remove("copied");
            }, 1000);
          }
          showToast("Copied: " + id);
        })
        .catch(() => {
          showToast("Copy failed");
        });
    }

    function highlightID(text, searchedID) {
      const idInText = getID(text);
      if (!idInText || idInText !== searchedID) {
        return escapeHtml(text);
      }

      const safeText = escapeHtml(text);
      return safeText.replace(
        idInText,
        `<span class="highlight">${idInText}</span>`
      );
    }

    function getBadgeClass(level) {
      return level.toLowerCase();
    }

    function buildRow(levelLabel, value, searchedID) {
      const idOnly = getID(value);

      return `
        <div class="row">
          <div class="left">
            <span class="badge ${getBadgeClass(levelLabel)}">${levelLabel.toUpperCase()}</span>
            ${highlightID(value, searchedID)}
          </div>
          <button class="copy-btn" onclick="copyID('${idOnly}', this)">Copy</button>
        </div>
      `;
    }

    function saveRecentSearch(id) {
      if (!id) return;
      recentSearches = recentSearches.filter(x => x !== id);
      recentSearches.unshift(id);
      recentSearches = recentSearches.slice(0, 5);
      localStorage.setItem("recentSearches", JSON.stringify(recentSearches));
      renderRecentSearches();
    }

    function renderRecentSearches() {
      const wrap = document.getElementById("recentSearches");
      wrap.innerHTML = "";

      if (recentSearches.length === 0) {
        wrap.innerHTML = `<span class="status">No recent searches</span>`;
        return;
      }

      recentSearches.forEach(id => {
        const btn = document.createElement("button");
        btn.className = "recent-chip";
        btn.textContent = id;
        btn.onclick = () => {
          document.getElementById("input").value = id;
          search();
        };
        wrap.appendChild(btn);
      });
    }

    function clearSearch() {
      document.getElementById("input").value = "";
      document.getElementById("result").innerHTML = "";
      document.getElementById("status").textContent = "";
      hideSuggestions();
      document.getElementById("input").focus();
    }

    function search() {
      const input = document.getElementById("input").value.trim();
      const id = getID(input);
      const resultDiv = document.getElementById("result");
      const status = document.getElementById("status");

      resultDiv.innerHTML = "";
      status.textContent = "";
      hideSuggestions();

      if (!id) {
        resultDiv.innerHTML = `<div class="empty-box">Please enter a valid ID.</div>`;
        return;
      }

      const results = data.filter(d =>
        getID(d.l1) === id ||
        getID(d.l2) === id ||
        getID(d.l3) === id ||
        getID(d.l4) === id
      );

      if (results.length === 0) {
        resultDiv.innerHTML = `<div class="empty-box">No match found.</div>`;
        return;
      }

      saveRecentSearch(id);
      status.textContent = `${results.length} match${results.length > 1 ? "es" : ""} found`;

      results.forEach((r, i) => {
        let html = `<div class="result-card"><div class="match-title">Match ${i + 1}</div>`;

        if (getID(r.l1) === id) {
          html += buildRow("l1", r.l1, id);
        } else if (getID(r.l2) === id) {
          html += buildRow("l1", r.l1, id);
          html += buildRow("l2", r.l2, id);
        } else if (getID(r.l3) === id) {
          html += buildRow("l1", r.l1, id);
          html += buildRow("l2", r.l2, id);
          html += buildRow("l3", r.l3, id);
        } else if (getID(r.l4) === id) {
          html += buildRow("l1", r.l1, id);
          html += buildRow("l2", r.l2, id);
          html += buildRow("l3", r.l3, id);
          html += buildRow("l4", r.l4, id);
        }

        html += `</div>`;
        resultDiv.innerHTML += html;
      });
    }

    function buildIdList() {
      const set = new Set();

      data.forEach(item => {
        [item.l1, item.l2, item.l3, item.l4].forEach(value => {
          const id = getID(value);
          if (id) set.add(id);
        });
      });

      allIds = [...set].sort();
    }

    function showSuggestions(items) {
      const box = document.getElementById("suggestions");

      if (!items.length) {
        hideSuggestions();
        return;
      }

      box.innerHTML = items.map(id => `
        <div class="suggestion-item" onclick="pickSuggestion('${id}')">${id}</div>
      `).join("");

      box.style.display = "block";
      currentSuggestions = items;
    }

    function hideSuggestions() {
      const box = document.getElementById("suggestions");
      box.style.display = "none";
      box.innerHTML = "";
      currentSuggestions = [];
    }

    function pickSuggestion(id) {
      document.getElementById("input").value = id;
      hideSuggestions();
    }

    function updateSuggestions() {
      const value = document.getElementById("input").value.trim();

      if (!value) {
        hideSuggestions();
        return;
      }

      const numeric = getID(value);
      const query = numeric || value;

      const matches = allIds
        .filter(id => id.startsWith(query))
        .slice(0, 8);

      showSuggestions(matches);
    }

    function toggleTheme() {
      const body = document.body;
      const btn = document.getElementById("modeToggle");

      body.classList.toggle("dark");
      const isDark = body.classList.contains("dark");

      localStorage.setItem("themeMode", isDark ? "dark" : "light");
      btn.textContent = isDark ? "☀ Light Mode" : "🌙 Dark Mode";
    }

    function loadTheme() {
      const saved = localStorage.getItem("themeMode");
      const btn = document.getElementById("modeToggle");

      if (saved === "dark") {
        document.body.classList.add("dark");
        btn.textContent = "☀ Light Mode";
      } else {
        btn.textContent = "🌙 Dark Mode";
      }
    }

    document.getElementById("input").addEventListener("input", updateSuggestions);

    document.getElementById("input").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        search();
      }
    });

    document.addEventListener("click", function(event) {
      const suggestions = document.getElementById("suggestions");
      const input = document.getElementById("input");

      if (!suggestions.contains(event.target) && event.target !== input) {
        hideSuggestions();
      }
    });

    loadTheme();
    renderRecentSearches();
    buildIdList();
// ✅ ===== TIME CALCULATOR =====

// Round UP (your requirement)
function roundUpTwo(num){
  return (Math.ceil(num * 100) / 100).toFixed(2);
}

// Minutes → HH:MM
function convertToHHMM(){
  let min = parseFloat(document.getElementById("minInput").value);
  let result = document.getElementById("timeResult");

  if(isNaN(min)){
    result.innerHTML = "Enter valid minutes";
    return;
  }

  let h = Math.floor(min / 60);
  let m = min % 60;

  let hhmm = String(h).padStart(2,'0') + ":" + String(m).padStart(2,'0');

  let exact = min / 60;
  let rounded = roundUpTwo(exact);

  result.innerHTML = `
    <b>HH:MM:</b> ${hhmm}<br>
    <b>Decimal Exact:</b> ${exact}<br>
    <b>Decimal Rounded:</b> ${rounded}
  `;
}

// HH:MM → Minutes
function convertToMin(){
  let h = parseFloat(document.getElementById("hourInput").value);
  let m = parseFloat(document.getElementById("minPartInput").value);
  let result = document.getElementById("timeResult");

  if(isNaN(h) || isNaN(m)){
    result.innerHTML = "Enter valid HH & MM";
    return;
  }

  let total = (h * 60) + m;

  result.innerHTML = `
    <b>Minutes:</b> ${total}
  `;
}

  </script>
</body>
</html>
