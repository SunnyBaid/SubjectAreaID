<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Lookup Tool</title>

<style>
:root {
  --bg: #f4f6f8;
  --card: #ffffff;
  --text: #1f1f1f;
  --border: #dddddd;
  --primary: #0078d4;
}

body.dark {
  --bg: #1e1e1e;
  --card: #2b2b2b;
  --text: #f5f5f5;
  --border: #444444;
}

body {
  margin:0;
  padding:20px;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.container {
  max-width:900px;
  margin:auto;
}

.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
}

.top-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

h2 {
  color:var(--primary);
}

.mode-toggle {
  cursor:pointer;
  padding:8px 10px;
  border-radius:6px;
  background:var(--primary);
  color:#fff;
  border:none;
}

input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-top:10px;
}

.btn {
  margin-top:10px;
  padding:10px;
  background:var(--primary);
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  width:100%;
}

.row {
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}

.result-card {
  border:1px solid var(--border);
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}

.split {
  display:flex;
  gap:10px;
}

#timeResult {
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
}
</style>

</head>

<body>

<div class="container">

<!-- ✅ ID TOOL -->
<div class="card">

<div class="top-bar">
<h2>ID Lookup Tool</h2>
<button class="mode-toggle" onclick="toggleTheme()">🌙</button>
</div>

<input id="input" placeholder="Enter ID">
<button class="btn" onclick="search()">Search</button>

<div id="result"></div>

</div>

<!-- ✅ TIME CALCULATOR -->
<div class="card">

<h2>Time Calculator</h2>

<input id="minInput" type="number" placeholder="Minutes (e.g. 50)">
<button class="btn" onclick="convertToHHMM()">Convert</button>

<br><br>

<div class="split">
  <input id="hourInput" type="number" placeholder="HH">
  <input id="minPartInput" type="number" placeholder="MM">
</div>

<button class="btn" onclick="convertToMin()">Convert</button>

<div id="timeResult"></div>

</div>

</div>

<script src="data.js"></script>

<script>

// ✅ DARK MODE
function toggleTheme(){
  document.body.classList.toggle("dark");
}

// ✅ ID GET
function getID(value){
  let match=value.toString().match(/\d+/);
  return match?match[0]:"";
}

// ✅ SEARCH
function search(){

  let id=getID(document.getElementById("input").value);
  let resultDiv=document.getElementById("result");

  resultDiv.innerHTML="";

  let results=data.filter(d =>
    getID(d.l1)==id ||
    getID(d.l2)==id ||
    getID(d.l3)==id ||
    getID(d.l4)==id
  );

  results.forEach(r=>{
    resultDiv.innerHTML+=`
      <div class="result-card">
        <div>L1: ${r.l1}</div>
        <div>L2: ${r.l2}</div>
        <div>L3: ${r.l3}</div>
        <div>L4: ${r.l4}</div>
      </div>`;
  });
}






// ✅ ✅ ROUND UP FUNCTION (FINAL FIX)
function roundUpTwo(num){
  return (Math.ceil(num * 100) / 100).toFixed(2);
}

// ✅ MIN → HH:MM
function convertToHHMM(){

  let min=parseFloat(document.getElementById("minInput").value);
  let result=document.getElementById("timeResult");

  if(isNaN(min)){
    result.innerHTML="Enter valid minutes";
    return;
  }

  let h=Math.floor(min/60);
  let m=min%60;

  let hhmm=String(h).padStart(2,'0')+":"+String(m).padStart(2,'0');

  let exact=min/60;
  let rounded=roundUpTwo(exact);

  result.innerHTML=`
    <b>HH:MM → ${hhmm}</b><br>
    Exact → ${exact}<br>
    Rounded → <b>${rounded}</b>
  `;
}


// ✅ HH+MM → MIN
function convertToMin(){

  let h=parseFloat(document.getElementById("hourInput").value);
  let m=parseFloat(document.getElementById("minPartInput").value);
  let result=document.getElementById("timeResult");

  if(isNaN(h)||isNaN(m)){
    result.innerHTML="Enter valid HH & MM";
    return;
  }

  let total=(h*60)+m;

  let exact=total/60;
  let rounded=roundUpTwo(exact);

  result.innerHTML=`
    <b>Minutes → ${total}</b><br>
    Exact → ${exact}<br>
    Rounded → <b>${rounded}</b>
  `;
}

</script>

</body>
</html>
``
